name: PR Review Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Run Git-Auto-PR
        uses: ./
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          run_linter: 'true'
          run_tests: 'true'
          coverage_threshold: '0'
          database_url: ${{ secrets.DATABASE_URL }}

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "text": ":red_circle: *PR Review Bot failed*\nRepo: `${{ github.repository }}`\nPR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}\n<${{ github.event.pull_request.html_url }}|View PR> | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }'
